<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Modernizer Playground</title>
  <style>
    :root {
      --primary: #0d9488;
      --primary-light: #14b8a6;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --critical: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --success: #22c55e;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--surface-2); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; color: var(--primary-light); }
    .header .badge { font-size: 11px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 99px; }
    .locale-toggle { margin-left: auto; background: var(--surface-2); border: none; color: var(--text); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
    .locale-toggle:hover { background: var(--primary); }
    .main { display: grid; grid-template-columns: 260px 1fr 1fr; height: calc(100vh - 53px); }
    .sidebar { background: var(--surface); border-right: 1px solid var(--surface-2); overflow-y: auto; padding: 12px; }
    .sidebar h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px; }
    .sample-item { padding: 10px 12px; border-radius: var(--radius); cursor: pointer; margin-bottom: 4px; border-left: 3px solid transparent; }
    .sample-item:hover { background: var(--surface-2); }
    .sample-item.active { background: var(--surface-2); border-left-color: var(--primary); }
    .sample-item .name { font-size: 13px; font-weight: 500; }
    .sample-item .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .dim-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 99px; margin-top: 4px; }
    .dim-vue { background: #42b88320; color: #42b883; }
    .dim-js { background: #f7df1e20; color: #f7df1e; }
    .dim-webpack { background: #8dd6f920; color: #8dd6f9; }
    .dim-jest { background: #c63d1420; color: #c63d14; }
    .dim-vuex { background: #42b88320; color: #42b883; }
    .dim-eslint { background: #4b32c320; color: #8b9cf7; }
    .editor-pane { display: flex; flex-direction: column; border-right: 1px solid var(--surface-2); }
    .pane-header { background: var(--surface); border-bottom: 1px solid var(--surface-2); padding: 8px 16px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .pane-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--success); }
    #editor { flex: 1; padding: 16px; font-family: 'SF Mono','Fira Code','Cascadia Code',monospace; font-size: 13px; line-height: 1.6; background: transparent; color: var(--text); border: none; resize: none; outline: none; tab-size: 2; }
    .scan-btn { margin: 12px 16px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
    .scan-btn:hover { background: var(--primary-light); }
    .results-pane { overflow-y: auto; display: flex; flex-direction: column; }
    .results-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--surface-2); }
    .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-dim); }
    .tab.active { color: var(--primary-light); border-bottom-color: var(--primary); }
    .results-content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .pattern-card { background: var(--surface); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; border-left: 3px solid; }
    .pattern-card.critical { border-left-color: var(--critical); }
    .pattern-card.warning  { border-left-color: var(--warning); }
    .pattern-card.info     { border-left-color: var(--info); }
    .pattern-card .severity { font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .critical .severity { color: var(--critical); }
    .warning  .severity { color: var(--warning); }
    .info     .severity { color: var(--info); }
    .pattern-card .rule-name { font-size: 14px; font-weight: 500; margin-top: 4px; }
    .pattern-card .suggestion { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .pattern-card .snippet { font-family: monospace; font-size: 12px; background: var(--bg); padding: 6px 8px; border-radius: 4px; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .report-content { padding: 16px; font-size: 13px; line-height: 1.7; }
    .report-content h3 { color: var(--primary-light); margin: 16px 0 8px; font-size: 16px; }
    .report-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .report-content th, .report-content td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--surface-2); font-size: 12px; }
    .report-content th { color: var(--text-dim); font-weight: 500; }
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: flex; overflow-x: auto; gap: 8px; }
      .sidebar h2 { display: none; }
      .sample-item { white-space: nowrap; min-width: 140px; margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏗️ Legacy Modernizer</h1>
    <span class="badge">Playground</span>
    <button class="locale-toggle" id="localeBtn">🌐 EN</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"><h2 id="sidebarTitle">示例文件</h2></div>
    <div class="editor-pane">
      <div class="pane-header"><span class="dot dot-green"></span><span id="fn">--</span></div>
      <textarea id="editor" spellcheck="false" placeholder="在此输入或粘贴代码..."></textarea>
      <button class="scan-btn" id="scanBtn">🔍 扫描遗留模式</button>
    </div>
    <div class="results-pane">
      <div class="results-tabs">
        <div class="tab active" id="tP">检测模式</div>
        <div class="tab" id="tR">分析报告</div>
      </div>
      <div class="results-content" id="rp"></div>
      <div class="results-content" id="rr" style="display:none"></div>
    </div>
  </div>

<script src="../internal/playground/app.js"></script>

</body>
</html>
